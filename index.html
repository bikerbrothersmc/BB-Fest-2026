<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikers Brothers Fest 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%);
            z-index: 0;
        }
        .ride {
            position: fixed;
            font-size: 120px;
            opacity: 0.03;
            z-index: 0;
            animation: ride 20s linear infinite;
            white-space: nowrap;
        }
        @keyframes ride {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(110vw); }
        }
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 40px;
            max-width: 640px;
        }
        .logo {
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        h1 {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        h1 .gold { color: #c9a84c; }
        .sub {
            font-size: 20px;
            color: #888;
            margin-bottom: 48px;
            letter-spacing: 2px;
        }
        .info {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 48px;
        }
        .info-block {
            text-align: center;
        }
        .info-block .num {
            font-size: 36px;
            font-weight: 700;
            color: #c9a84c;
        }
        .info-block .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-top: 4px;
        }
        .cta {
            display: inline-block;
            border: 2px solid #c9a84c;
            color: #c9a84c;
            padding: 14px 40px;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
        }
        .cta:hover {
            background: #c9a84c;
            color: #0a0a0a;
        }
        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="ride">🏍️</div>
    <div class="card">
        <div class="logo">Bikers Brothers MC</div>
        <h1>Добро пожаловать<br>на <span class="gold">15-й юбилейный</span><br>Байкерс Бразерс<br>фестиваль 2026</h1>
        <div class="sub">BIKERS BROTHERS FEST 2026</div>
        <div class="info">
            <div class="info-block">
                <div class="num">15</div>
                <div class="label">Лет</div>
            </div>
            <div class="info-block">
                <div class="num">2026</div>
                <div class="label">Год</div>
            </div>
            <div class="info-block">
                <div class="num">BB</div>
                <div class="label">MC</div>
            </div>
        </div>
        <a href="#" class="cta">До встречи</a>
        <div class="footer">Bikers Brothers MC &copy; 2026</div>
    </div>
</body>
</html>
