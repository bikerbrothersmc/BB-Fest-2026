<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мотоквест — Пульс Города</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #f0e6c8;
    font-family: 'Arial Black', 'Impact', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image: radial-gradient(ellipse at center, #2a2210 0%, #0d0d0d 70%);
  }
  .poster {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
  }
  .poster img {
    width: 100%;
    display: block;
    border-bottom: 3px solid #c9a52c;
  }
  .code-section {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .code-label {
    font-size: 14px;
    letter-spacing: 4px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .code {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #c9a52c;
    text-shadow: 0 0 20px rgba(201,165,44,0.4);
    font-family: 'Courier New', monospace;
  }
  .qr-section {
    text-align: center;
    padding: 20px;
  }
  .qr-section img {
    width: 180px;
    height: 180px;
    border: 4px solid #c9a52c;
    border-radius: 12px;
    padding: 8px;
    background: #fff;
  }
  .footer {
    text-align: center;
    padding: 20px;
    color: #666;
    font-size: 12px;
    letter-spacing: 3px;
  }
  .footer a {
    color: #c9a52c;
    text-decoration: none;
  }
</style>
</head>

<div class="poster">
  <img src="motokvest-poster.jpg" alt="Мотоквест — Пульс Города">
</div>

<div class="code-section">

</html>
